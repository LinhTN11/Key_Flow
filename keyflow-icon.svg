<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Deep Dark Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0e0e11" />
      <stop offset="100%" stop-color="#050507" />
    </linearGradient>

    <!-- Premium Metallic Gradient for the Input Shell (C-shape) -->
    <linearGradient id="cGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a3a46" />
      <stop offset="50%" stop-color="#202028" />
      <stop offset="100%" stop-color="#0f0f14" />
    </linearGradient>

    <!-- Vibrant Gradient for the Data Flow (Gantt bars) -->
    <!-- userSpaceOnUse ensures the gradient flows perfectly across all bars as one cohesive element -->
    <linearGradient id="flowGrad" gradientUnits="userSpaceOnUse" x1="196" y1="0" x2="396" y2="0">
      <stop offset="0%" stop-color="#a855f7" />  <!-- Purple -->
      <stop offset="50%" stop-color="#6366f1" /> <!-- Indigo -->
      <stop offset="100%" stop-color="#2dd4bf" /> <!-- Teal -->
    </linearGradient>

    <!-- Smooth Drop Shadow for depth -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#000" flood-opacity="0.7"/>
    </filter>

    <!-- Intense Neon Glow for the flowing data -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur1" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="24" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- App Icon Base -->
  <rect width="512" height="512" rx="112" fill="url(#bg)" />
  
  <!-- Subtle Outer Ring Highlight (gives it an iOS/macOS premium feel) -->
  <rect x="2" y="2" width="508" height="508" rx="110" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.04" />

  <!-- 1. The Input Shell (Represents the Keycap / Origin) -->
  <path d="M 316 140 L 176 140 Q 116 140 116 200 L 116 312 Q 116 372 176 372 L 316 372" 
        fill="none" 
        stroke="url(#cGrad)" 
        stroke-width="32" 
        stroke-linecap="round" 
        filter="url(#dropShadow)" />

  <!-- 2. The Flow (Represents the Gantt Chart / Timeline Data) -->
  <g filter="url(#neonGlow)">
    <!-- Top Bar -->
    <line x1="196" y1="200" x2="276" y2="200" stroke="url(#flowGrad)" stroke-width="32" stroke-linecap="round" />
    
    <!-- Middle Bar (Longest, leads the flow) -->
    <line x1="196" y1="256" x2="396" y2="256" stroke="url(#flowGrad)" stroke-width="32" stroke-linecap="round" />
    
    <!-- Bottom Bar -->
    <line x1="256" y1="312" x2="356" y2="312" stroke="url(#flowGrad)" stroke-width="32" stroke-linecap="round" />
    
    <!-- Active Playhead / Leading Node -->
    <circle cx="396" cy="256" r="16" fill="#ffffff" />
  </g>
  
  <!-- Crisp inner core for the leading node to make it pop -->
  <circle cx="396" cy="256" r="8" fill="#ffffff" />

</svg>
